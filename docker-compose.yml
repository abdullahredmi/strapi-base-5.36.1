services:
  strapi:
    # network_mode: "host" #comment in localhost
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aditya-cms
    ports:
      - '${APP_BIND_ADDRESS:-0.0.0.0}:${PORT:-1339}:1339'
    env_file:
      - .env
    environment:
      - DATABASE_CLIENT=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_USERNAME=${DATABASE_USERNAME}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_SSL=${DATABASE_SSL:-false}
      - DATABASE_SSL_MODE=${DATABASE_SSL_MODE:-disable}
    volumes:
      - ./config:/opt/app/config
      - ./src:/opt/app/src
      - ./package.json:/opt/app/package.json
      - ./package-lock.json:/opt/app/package-lock.json
      - strapi-uploads:/opt/app/public/
      - ./.env:/opt/app/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:1337 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '2'
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: aditya-cms-db
    ports:
      - '${DATABASE_BIND_ADDRESS:-0.0.0.0}:${DATABASE_PORT:-5433}:5432'
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DATABASE_NAME:-aditya_dev_db}
      - POSTGRES_USER=${DATABASE_USERNAME:-aditya_dev_user}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_MAX_CONNECTIONS=100
      - POSTGRES_SSL_MODE=${DATABASE_SSL_MODE:-disable}
    command: postgres -c 'max_connections=100'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-aditya_dev_user} -d ${DATABASE_NAME:-aditya_dev_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  strapi-uploads:
    driver: local
  postgres_data:
    driver: local